services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medlib}
      POSTGRES_USER: ${POSTGRES_USER:-medlib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medlib}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medlib} -d ${POSTGRES_DB:-medlib}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://medlib:medlib@db:5432/medlib}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost:8080"]}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-deu+eng}
      STORAGE_DIR: /data/books
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-2048}
      ROOT_ADMIN_EMAIL: ${ROOT_ADMIN_EMAIL:-}
      ROOT_ADMIN_PASSWORD: ${ROOT_ADMIN_PASSWORD:-}
      ROOT_ADMIN_FULL_NAME: ${ROOT_ADMIN_FULL_NAME:-Root Administrator}
      ROOT_ADMIN_UPDATE_PASSWORD: ${ROOT_ADMIN_UPDATE_PASSWORD:-false}
    volumes:
      - ./storage/books:/data/books
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres-data:
